name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-amd64
            artifact_name: artemis-windows-amd64
          - os: ubuntu-latest
            label: linux-amd64
            artifact_name: artemis-linux-amd64
          - os: macos-latest
            label: macos
            artifact_name: artemis-macos

    env:
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION != '' }}
      HAS_APPLE_NOTARY: ${{ secrets.APPLE_NOTARY_APPLE_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        shell: bash
        run: |
          cd frontend
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend assets
        shell: bash
        run: |
          cd frontend
          npm run build

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update

      - name: Build app (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p build/bin
          go build -o build/bin/artemis .

      - name: Build app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build/bin -Force | Out-Null
          go build -o build/bin/artemis.exe .

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\${{ matrix.artifact_name }}\frontend -Force | Out-Null
          Copy-Item build/bin/artemis.exe dist/${{ matrix.artifact_name }}/artemis.exe -Force
          Copy-Item config.json dist/${{ matrix.artifact_name }}/config.json -Force
          Copy-Item -Recurse frontend/dist dist/${{ matrix.artifact_name }}/frontend/dist -Force
          Compress-Archive -Path dist/${{ matrix.artifact_name }}/* -DestinationPath dist/${{ matrix.artifact_name }}.zip -Force

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}/frontend
          cp build/bin/artemis dist/${{ matrix.artifact_name }}/artemis
          cp config.json dist/${{ matrix.artifact_name }}/config.json
          cp -r frontend/dist dist/${{ matrix.artifact_name }}/frontend/dist
          tar -czf dist/${{ matrix.artifact_name }}.tar.gz -C dist ${{ matrix.artifact_name }}

      - name: Package Linux AppImage artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps

          cp build/bin/artemis AppDir/usr/bin/artemis
          chmod +x AppDir/usr/bin/artemis

          cat > AppDir/usr/share/applications/artemis.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Artemis
          Exec=artemis
          Icon=artemis
          Categories=Development;Network;
          Terminal=false
          EOF

          if [ -f build/appicon.png ]; then
            cp build/appicon.png AppDir/usr/share/icons/hicolor/256x256/apps/artemis.png
          else
            # 1x1 transparent PNG fallback icon
            echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO5vGJcAAAAASUVORK5CYII=' | base64 -d > AppDir/usr/share/icons/hicolor/256x256/apps/artemis.png
          fi

          cp AppDir/usr/share/applications/artemis.desktop AppDir/artemis.desktop
          cp AppDir/usr/share/icons/hicolor/256x256/apps/artemis.png AppDir/artemis.png

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool AppDir dist/artemis-linux-amd64.AppImage

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}/frontend
          cp build/bin/artemis dist/${{ matrix.artifact_name }}/artemis
          cp config.json dist/${{ matrix.artifact_name }}/config.json
          cp -R frontend/dist dist/${{ matrix.artifact_name }}/frontend/dist
          ditto -c -k dist/${{ matrix.artifact_name }} dist/${{ matrix.artifact_name }}.zip

      - name: macOS signing placeholder
        if: runner.os == 'macOS' && env.HAS_APPLE_SIGNING == 'true'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "macOS signing placeholder: import certificate and codesign binary or app bundle here"
          echo "Example identity: $APPLE_DEVELOPER_ID_APPLICATION"

      - name: macOS notarization placeholder
        if: runner.os == 'macOS' && env.HAS_APPLE_NOTARY == 'true'
        shell: bash
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          echo "macOS notarization placeholder: submit notarization and staple ticket here"

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}.tar.gz
            dist/artemis-linux-amd64.AppImage
          if-no-files-found: error

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-dist
          find release-artifacts -type f -exec cp {} release-dist/ \;
          ls -la release-dist

      - name: Generate checksums
        shell: bash
        run: |
          cd release-dist
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
          generate_release_notes: true
